name: test-datapackage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          frozen: true

      - name: Run datapackage tests
        run: pixi run test-datapackage

  check-reference-traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          frozen: true

      - name: Run reference traceability check
        run: pixi run check-reference-traceability
