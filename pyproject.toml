[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tool.pixi.pypi-dependencies]

[tool.pixi.tasks]

[tool.pixi.dependencies]
duckdb = ">=1.5.1,<2"
jq = ">=1.8.1,<2"
prek = ">=0.3.8,<0.4"
mdformat = ">=1.0.0,<2"
mdformat-frontmatter = ">=2.0.10,<3"
pandas = ">=3.0.2,<4"
pyarrow = ">=23.0.1,<24"
polars = ">=1.39.3,<2"
awscli = ">=2.34.23,<3"
s3fs = ">=2026.3.0,<2027"
fsspec = ">=2026.3.0,<2027"
mdformat-gfm = ">=1.0"
mdformat-ruff = ">=0.1.3,<0.2"
mdformat-shfmt = ">=0.2.0,<0.3"
ruff = ">=0.15.9,<0.16"
prettier = ">=3.8.1,<4"
shellcheck = ">=0.11.0,<0.12"
taplo = ">=0.10.0,<0.11"
actionlint = ">=1.7.12,<2"
typos = ">=1.45.0,<2"
ty = ">=0.0.29,<0.0.30"
beautifulsoup4 = ">=4.14.3,<5"

[tool.typos.files]
extend-exclude = [
  # Vendored schemas and machine-generated JSON data files
  "skills/*/assets/",
  # Markdown reference tables generated from JSON by scripts/generate_ferc_tables.py
  "skills/pudl/references/ferc1-schedules.md",
  "skills/pudl/references/ferc2-schedules.md",
]

[tool.typos.default.extend-words]
# FERC XBRL table/column names with upstream typos — these are canonical identifiers
# published by FERC and cannot be corrected without breaking data compatibility
acitivities = "acitivities"
recieved = "recieved"
Recieved = "Recieved"
transporation = "transporation"
Transporation = "Transporation"
