services:
  sandbox:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - agent-skills-pixi:/workspace/.pixi
    working_dir: /workspace
    environment:
      ANTHROPIC_API_KEY:
      GEMINI_API_KEY:
      GITHUB_TOKEN:
      GOOGLE_API_KEY:
      OPENAI_API_KEY:
      OPENROUTER_API_KEY:
      NPM_CONFIG_CACHE: /workspace/.pixi/.npm-cache
    stdin_open: true
    tty: true

volumes:
  agent-skills-pixi:
    external: true
